spring.application.name=quindioflix-bd2

# Conexion Oracle XE local
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=quindioflix
spring.datasource.password=quindioflix2026
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true

# MOD-2: ruta base para datafiles Oracle (placeholder usado en V1__tablespaces.sql)
# Cada integrante ajusta esta ruta segun su instalacion local de Oracle XE:
#   Windows : C:/oracle/oradata/XEPDB1
#   Linux   : /opt/oracle/oradata/XEPDB1
#   Mac     : /Users/tuusuario/oracle/oradata/XEPDB1
# El directorio debe existir y Oracle debe tener permisos de escritura sobre el.
spring.flyway.placeholders.ruta_base=/opt/oracle/oradata/XE/XEPDB1

# Sin auto-creacion de tablas
spring.jpa.hibernate.ddl-auto=none